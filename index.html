    <!DOCTYPE html>
<html>
<head>
  <title>Upload Dress</title>
  <style>
    body {
      background: #dfeee7;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 300px;
    }

    h2 {
      color: #2e7d32;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    #arrow {
      font-size: 30px;
      margin-top: 20px;
      display: none;
      cursor: pointer;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Upload Dress Image 🌸</h2>

  <input type="file" id="file"><br>

  <button onclick="send()">Send ➤</button>

  <div class="success" id="msg"></div>

  <div id="arrow" onclick="nextPage()">➜</div>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/water/sounds/water-drop-1.mp3">
</audio>

<script>
function send() {
  document.getElementById("msg").innerHTML = "Success ✅";

  // play sound
  document.getElementById("sound").play();

  // show arrow
  document.getElementById("arrow").style.display = "block";
}

function nextPage() {
  window.location.href = "size.html";
}
</script>

</body>
</html>
