  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dress Upload</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #e6f4ea, #f5fff7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main Card */
.container {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  animation: fadeIn 1s ease;
}

/* Title */
h2 {
  margin-bottom: 20px;
  color: #2e7d32;
}

/* File input */
input[type="file"] {
  margin: 15px 0;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  background: linear-gradient(45deg, #66bb6a, #43a047);
  color: white;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(45deg, #43a047, #2e7d32);
}

/* Status text */
#status {
  margin-top: 15px;
  font-weight: bold;
  color: #2e7d32;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>Upload Dress Image 🌸</h2>

  <input type="file" id="fileInput">
  <br>

  <button onclick="uploadImage()">Send ➤</button>

  <p id="status"></p>
</div>

<script>
function uploadImage() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  fetch("https://pattern-backend-wjbp.onrender.com/upload", {
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    document.getElementById("status").innerText = "Success ✅";
  })
  .catch(error => {
    document.getElementById("status").innerText = "Error ❌";
  });
}
</script>

</body>
</html>
