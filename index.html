<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dress Upload</title>

  <style>
    body {
      background: #e6f4ea;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Upload Dress Image</h2>

  <input type="file" id="fileInput">
  <br>

  <button onclick="uploadImage()">Send</button>

  <p id="status"></p>
</div>

<script>
function uploadImage() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  fetch("https://pattern-backend-wjbp.onrender.com/upload", {
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    document.getElementById("status").innerText = "Success ✅";
    console.log(data);
  })
  .catch(error => {
    document.getElementById("status").innerText = "Error ❌";
    console.error(error);
  });
}
</script>

</body>
</html>
