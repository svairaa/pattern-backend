<!DOCTYPE html>
<html>
<head>
<title>Dress AI</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI';
  background:#e6f4ec;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  background:white;
  padding:40px;
  border-radius:25px;
  text-align:center;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Title */
h2{
  color:#2e7d32;
}

/* Button */
button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

/* Arrow */
#next{
  display:none;
  font-size:25px;
  margin-top:15px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="card">
  <h2>Upload Your Dress 👗</h2>

  <input type="file" id="file"><br>

  <button onclick="send()">Analyze ➜</button>

  <p id="out"></p>

  <div id="next" onclick="go()">➡</div>
</div>

<script>
async function send(){
  let f=document.getElementById("file").files[0];
  if(!f){ alert("Select image"); return;}

  let fd=new FormData();
  fd.append("file",f);

  let r=await fetch("https://pattern-backend-wjbp.onrender.com/upload",{method:"POST",body:fd});
  let d=await r.json();

  localStorage.setItem("ai",JSON.stringify(d));

  document.getElementById("out").innerText=
    "Type: "+d.type+" | Sleeve: "+d.sleeve+" | Neck: "+d.neck;

  document.getElementById("next").style.display="block";
}

function go(){
  window.location.href="./size.html";
}
</script>

</body>
</html>
