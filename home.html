<!DOCTYPE html>
<html>
<head>
  <title>Select Size</title>
  <style>
    body {
      background: linear-gradient(to bottom, #e8f5ec, #f4fbf7);
      font-family: 'Segoe UI';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 25px;
      text-align: center;
      width: 320px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      width: 100%;
      margin-bottom: 20px;
    }

    button {
      background: linear-gradient(45deg, #4CAF50, #2e7d32);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Select Your Size 👗</h2>

  <select id="size">
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
    <option>XXL</option>
  </select>

  <button onclick="next()">Continue ➜</button>
</div>

<script>
function next() {
  window.location.href = "./measure.html";
}
</script>

</body>
</html>
