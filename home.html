<!DOCTYPE html>
<html>
<head>
  <title>Upload Dress</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #dfeee7, #cfe3d8);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      text-align: center;
      width: 300px;
      animation: fadeIn 0.6s ease;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    input {
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1b5e20;
    }

    #msg {
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }

    #arrow {
      display: none;
      margin-top: 20px;
      font-size: 25px;
      cursor: pointer;
      color: #2e7d32;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Upload Dress Image 🌸</h2>

  <input type="file" id="file">

  <br>

  <button onclick="send()">Send ➤</button>

  <div id="msg"></div>

  <div id="arrow" onclick="goNext()">➡</div>
</div>

<script>
async function send() {
  let fileInput = document.getElementById("file");
  let file = fileInput.files[0];

  if (!file) {
    alert("Please select image ❗");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  try {
    let response = await fetch("https://pattern-backend-wjbp.onrender.com/upload", {
      method: "POST",
      body: formData
    });

    let data = await response.json();

    document.getElementById("msg").innerHTML = "Uploaded Successfully ✅";
    document.getElementById("arrow").style.display = "block";

  } catch (error) {
    alert("Upload failed ❌");
  }
}

function goNext() {
  window.location.href = "size.html";
}
</script>

</body>
</html>
