<!DOCTYPE html>
<html>
<head>
  <title>Upload Dress</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #e6f4ec, #f4fbf7);
      font-family: 'Segoe UI';
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 25px;
      text-align: center;
      width: 320px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    button {
      background: linear-gradient(45deg, #4CAF50, #2e7d32);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 10px;
    }

    #arrow {
      font-size: 30px;
      margin-top: 20px;
      display: none;
      cursor: pointer;
    }

    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Upload Dress Image 🌸</h2>

  <input type="file" id="file"><br>

  <button onclick="send()">Send ➤</button>

  <div class="success" id="msg"></div>

  <div id="arrow" onclick="nextPage()">➜</div>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/water/sounds/water-drop-1.mp3">
</audio>

<script>
function send() {
  document.getElementById("msg").innerHTML = "Success ✅";
  document.getElementById("sound").play();
  document.getElementById("arrow").style.display = "block";
}

function nextPage() {
  window.location.href = "./size.html";
}
</script>

</body>
</html>
