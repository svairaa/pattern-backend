<!DOCTYPE html>
<html>
<head>
    <title>Pattern Generator</title>
    <style>
        body {
            background: #dff5e3;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #7ecf9a;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Upload Dress</h2>
    <input type="file" id="file">
    <br><br>
    <button onclick="upload()">Next →</button>
</div>

<script>
function upload() {
    let file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    fetch("http://127.0.0.1:5000/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("style", JSON.stringify(data));
        window.location.href = "measure.html";
    });
}
</script>

</body>
</html>
