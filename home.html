<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svairaa • Generate Sewing Patterns</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #f8fdf9 0%, #e6f4ea 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.upload {
    border:2px dashed #a8e6cf;
    padding:30px;
    border-radius:15px;
    cursor:pointer;
}

button {
    margin-top:20px;
    padding:12px;
    width:100%;
    background:#2d6a4f;
    color:white;
    border:none;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Upload Dress 👗</h2>

<div class="upload" onclick="pick()">
Click or drop image
</div>

<input type="file" id="file" hidden>

<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">

<button onclick="next()" id="btn" disabled>Continue →</button>

</div>

<script>
const fileInput=document.getElementById("file");
const preview=document.getElementById("preview");
const btn=document.getElementById("btn");

function pick(){
    fileInput.click();
}

fileInput.onchange=()=>{
    const file=fileInput.files[0];
    preview.src=URL.createObjectURL(file);
    preview.style.display="block";
    btn.disabled=false;

    // SAVE IMAGE TEMP
    localStorage.setItem("img",preview.src);
}

function next(){
    window.location.href="measure.html";
}
</script>

</body>
</html>
