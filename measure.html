<!DOCTYPE html>
<html>
<head>
  <title>Measurements</title>

  <style>
    body {
      background: #dfeee7;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Measurements 📏</h2>

  <input placeholder="Bust (cm)">
  <input placeholder="Waist (cm)">
  <input placeholder="Length (cm)">

  <!-- ✅ FIXED BUTTON -->
  <button onclick="fakeGenerate()">Generate Pattern ➜</button>
</div>

<script>
function fakeGenerate() {
  alert("Pattern generated ✅ (Demo mode)");

  // optional fake download
  const link = document.createElement('a');
  link.href = "https://via.placeholder.com/800x1000.png?text=Pattern+Preview";
  link.download = "pattern.png";
  link.click();
}
</script>

</body>
</html>
