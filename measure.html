<!DOCTYPE html>
<html>
<body style="text-align:center;padding-top:50px;">

<h2>Measurements</h2>
<div id="form"></div>

<button onclick="send()">Generate Pattern</button>

<script>
let ai = JSON.parse(localStorage.getItem("ai"));
let fields = ai.measurements;

let html="";
fields.forEach(f=>{
  html+=`<input id="${f}" placeholder="${f} cm"><br><br>`;
});
document.getElementById("form").innerHTML=html;

async function send(){
  let data = {
    size:localStorage.getItem("size"),
    type:ai.type,
    sleeve:ai.sleeve,
    neck:ai.neck
  };

  fields.forEach(f=>{
    data[f]=document.getElementById(f).value;
  });

  let r = await fetch("https://pattern-backend-wjbp.onrender.com/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  let blob = await r.blob();
  let url = URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="pattern.pdf";
  a.click();
}
</script>

</body>
</html>
