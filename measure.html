<!DOCTYPE html>
<html>
<head>
  <title>Measurements</title>
  <style>
    body {
      background: #f3f8f5;
      font-family: 'Segoe UI';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      background: green;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Measurements 📏</h2>

  <input placeholder="Bust">
  <input placeholder="Waist">
  <input placeholder="Hip">
  <input placeholder="Length">

  <button onclick="done()">Finish ✔</button>
</div>

<script>
function done() {
  alert("Dress customization started 🎉");
}
</script>

</body>
</html>
