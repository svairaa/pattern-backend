<!DOCTYPE html>
<html>
<head>
<style>
body{
  background:#e6f4ea;
  text-align:center;
  padding-top:100px;
}
.box{
  background:white;
  padding:30px;
  border-radius:20px;
  display:inline-block;
}
input{
  display:block;
  margin:10px auto;
  padding:10px;
}
button{
  padding:10px 20px;
  background:green;
  color:white;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="box">
<h2>Measurements</h2>

<input id="bust" placeholder="Bust">
<input id="waist" placeholder="Waist">
<input id="length" placeholder="Length">

<button onclick="generate()">Generate Pattern</button>
</div>

<script>
async function generate(){

  const data={
    bust:document.getElementById("bust").value,
    waist:document.getElementById("waist").value,
    length:document.getElementById("length").value
  };

  const res=await fetch("https://pattern-backend-1.onrender.com/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const blob=await res.blob();
  const url=window.URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="pattern.pdf";
  a.click();
}
</script>

</body>
</html>
