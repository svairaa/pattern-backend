      <!DOCTYPE html>
<html>
<head>
  <title>Measurements</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #e6f2ec, #d4e8dd);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      animation: fadeIn 0.6s ease;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      background: #2e7d32;
      color: white;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1b5e20;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #ccc;
      color: black;
      width: auto;
      padding: 8px 12px;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<!-- Back Button -->
<button class="back" onclick="goBack()">⬅ Back</button>

<div class="box">
  <h2>Enter Measurements 📏</h2>

  <input id="bust" placeholder="Bust (cm)">
  <input id="waist" placeholder="Waist (cm)">
  <input id="hip" placeholder="Hip (cm)">
  <input id="length" placeholder="Length (cm)">

  <button onclick="submitData()">Generate Pattern 🚀</button>
</div>

<script>
function goBack() {
  window.location.href = "./size.html";
}

async function submitData() {

  let size = localStorage.getItem("size");

  let data = {
    size: size,
    bust: document.getElementById("bust").value,
    waist: document.getElementById("waist").value,
    hip: document.getElementById("hip").value,
    length: document.getElementById("length").value
  };

  try {
    let response = await fetch("https://pattern-backend-wjbp.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    let blob = await response.blob();

    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "pattern.pdf";
    a.click();

  } catch (error) {
    alert("Error generating pattern ❌");
  }
}
</script>

</body>
</html>
