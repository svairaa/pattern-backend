  <!DOCTYPE html>
<html>
<head>
<style>
body{
  background:#e6f4ec;
  font-family:'Segoe UI';
  text-align:center;
  padding-top:50px;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  display:inline-block;
}

input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Enter Measurements 📏</h2>

<div id="form"></div>

<button onclick="submitData()">Generate Pattern</button>
</div>

<script>
let ai = JSON.parse(localStorage.getItem("ai"));

// fallback if AI missing
if(!ai){
  ai = { measurements:["bust","waist","length"], type:"dress", sleeve:"short sleeve", neck:"round" };
}

let html="";
ai.measurements.forEach(f=>{
  html += `<input id="${f}" placeholder="${f} (cm)"><br>`;
});

document.getElementById("form").innerHTML = html;

async function submitData(){
  let data = {
    size: localStorage.getItem("size") || "M",
    type: ai.type,
    sleeve: ai.sleeve,
    neck: ai.neck
  };

  ai.measurements.forEach(f=>{
    let val = document.getElementById(f).value;
    data[f] = val === "" ? "0" : val;   // ✅ FIX
  });

  try{
    let res = await fetch("https://pattern-backend-wjbp.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    if(!res.ok){
      alert("Server error ❌");
      return;
    }

    let blob = await res.blob();
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "pattern.pdf";
    a.click();

  }catch(err){
    alert("Error: "+err);
  }
}
</script>

</body>
</html>
