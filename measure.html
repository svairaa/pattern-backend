<!DOCTYPE html>
<html>
<head>
    <title>Measurements</title>
    <style>
        body {
            background: #dff5e3;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input, select {
            margin: 5px;
            padding: 8px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #7ecf9a;
            border: none;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Select Size</h2>

    <select id="mode" onchange="toggle()">
        <option value="standard">Standard</option>
        <option value="custom">Custom</option>
    </select>

    <div id="standard">
        <select id="size">
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
            <option>XXL</option>
        </select>
    </div>

    <div id="custom" style="display:none;">
        <input placeholder="Bust" id="bust"><br>
        <input placeholder="Waist" id="waist"><br>
        <input placeholder="Hip" id="hip"><br>
        <input placeholder="Length" id="length"><br>
        <input placeholder="Shoulder" id="shoulder"><br>
        <input placeholder="Sleeve" id="sleeve"><br>
    </div>

    <button onclick="generate()">Generate Pattern</button>
</div>

<script>
function toggle() {
    let mode = document.getElementById("mode").value;
    document.getElementById("standard").style.display = mode === "standard" ? "block" : "none";
    document.getElementById("custom").style.display = mode === "custom" ? "block" : "none";
}

function generate() {
    let mode = document.getElementById("mode").value;
    let style = JSON.parse(localStorage.getItem("style"));

    let data = { mode: mode, style: style };

    if (mode === "standard") {
        data["size"] = document.getElementById("size").value;
    } else {
        data["measurements"] = {
            bust: parseFloat(document.getElementById("bust").value),
            waist: parseFloat(document.getElementById("waist").value),
            hip: parseFloat(document.getElementById("hip").value),
            length: parseFloat(document.getElementById("length").value),
            shoulder: parseFloat(document.getElementById("shoulder").value),
            sleeve: parseFloat(document.getElementById("sleeve").value)
        };
    }

    fetch("http://127.0.0.1:5000/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = "http://127.0.0.1:5000/download?file=" + data.file;
    });
}
</script>

</body>
</html>
