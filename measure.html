  <!DOCTYPE html>
<html>
<head>
  <title>Measurements</title>

  <style>
    body {
      background: #dfeee7;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Measurements 📏</h2>

  <input placeholder="Bust">
  <input placeholder="Waist">
  <input placeholder="Length">

  <!-- ✅ BUTTON (already fixed here) -->
  <button onclick="generatePattern()">Generate Pattern ➜</button>
</div>

<script>
async function generatePattern() {

  const inputs = document.querySelectorAll("input");

  const bust = inputs[0].value;
  const waist = inputs[1].value;
  const length = inputs[2].value;

  try {
    const response = await fetch("https://pattern-backend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        bust: bust,
        waist: waist,
        length: length
      })
    });

    if (!response.ok) {
      alert("Server error ❌");
      return;
    }

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "pattern.pdf";
    a.click();

  } catch (error) {
    alert("Connection error ❌");
  }
}
</script>

</body>
</html>
