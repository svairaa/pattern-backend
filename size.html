<!DOCTYPE html>
<html>
<head>
  <title>Select Size</title>
  <style>
    body {
      background: #f3f8f5;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
    }

    select, button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Select Your Size 👗</h2>

  <select>
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
    <option>XXL</option>
  </select>

  <br>
  <button>Continue</button>
</div>

</body>
</html>
