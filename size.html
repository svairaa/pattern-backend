  <!DOCTYPE html>
<html>
<head>
  <title>Select Size</title>

  <style>
    body {
      background: #eef5f0;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      background: #2e7d32;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #ccc;
      color: black;
      width: auto;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<!-- Back Button -->
<button class="back" onclick="goHome()">⬅ Back</button>

<div class="box">
  <h2>Select Your Size 👗</h2>

  <select id="size">
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
    <option value="XL">XL</option>
    <option value="XXL">XXL</option>
  </select>

  <button onclick="goNext()">Continue ➜</button>
</div>

<script>
function goHome() {
  window.location.href = "./home.html";
}

function goNext() {
  let size = document.getElementById("size").value;

  // Save selected size
  localStorage.setItem("size", size);

  // Go to next page
  window.location.href = "./measure.html";
}
</script>

</body>
</html>
