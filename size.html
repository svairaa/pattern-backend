  <!DOCTYPE html>
<html>
<body style="text-align:center;padding-top:100px;">

<h2>Select Size</h2>

<select id="size">
<option>S</option><option>M</option><option>L</option>
<option>XL</option><option>XXL</option>
<option value="custom">Custom</option>
</select>

<br><br>
<button onclick="go()">Continue</button>

<script>
function go(){
  localStorage.setItem("size",document.getElementById("size").value);
  window.location.href="measure.html";
}
</script>

</body>
</html>
